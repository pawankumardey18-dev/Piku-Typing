<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piku Typing — Custom Test</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='5' y='5' width='90' height='90' rx='20' fill='%233a6bc5'/><path d='M35 30V70M35 30H55C63.2843 30 70 36.7157 70 45C70 53.2843 63.2843 60 55 60H35' stroke='white' stroke-width='10' stroke-linecap='round'/></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ========== HEADER ========== -->
  <header class="main-header">
    <a class="brand" href="Index.html">
      <svg width="40" height="40" viewBox="0 0 100 100" fill="none">
        <defs>
          <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#3a6bc5"/>
            <stop offset="100%" style="stop-color:#7351b5"/>
          </linearGradient>
        </defs>
        <rect x="5" y="5" width="90" height="90" rx="20" fill="url(#pg)"/>
        <rect x="5" y="5" width="90" height="45" rx="20" fill="white" fill-opacity="0.1"/>
        <path d="M35 30V70M35 30H55C63.28 30 70 36.72 70 45C70 53.28 63.28 60 55 60H35"
              stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="58" y="65" width="12" height="4" fill="white">
          <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
        </rect>
      </svg>
      <div class="logo">Piku Typing</div>
    </a>
    <div class="header-actions" id="headerActions"></div>
  </header>

  <!-- ========== MAIN ========== -->
  <main class="container">

    <!-- Hero -->
    <div class="card" style="text-align:center;padding:2.5rem 2rem 2rem;">
      <h1 style="font-family:var(--font-display);font-size:2.4rem;font-weight:800;
                 background:var(--gradient-brand);-webkit-background-clip:text;
                 background-clip:text;color:transparent;margin-bottom:0.6rem;">
        ✏️ Custom Typing Test
      </h1>
      <p style="color:var(--text-secondary);font-size:1.05rem;max-width:560px;margin:0 auto;">
        Paste any text — a paragraph, code, lyrics, an email — and practice typing it.
        Long texts split into chunks automatically.
      </p>
    </div>

    <!-- Input Section -->
    <div class="card" id="inputSection">
      <div class="card-header-row">
        <h3>📋 Your Text</h3>
        <div style="display:flex;gap:0.5rem;">
          <button class="btn btn-sm" id="clearTextBtn">Clear</button>
          <button class="btn btn-sm" id="sampleBtn">Try a Sample</button>
        </div>
      </div>

      <textarea
        class="custom-textarea"
        id="customTextarea"
        placeholder="Paste or type your text here... minimum 10 characters to start."
      ></textarea>

      <div class="custom-meta" id="textMeta">0 characters · 0 words</div>

      <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:center;">
        <button class="btn btn-primary" id="startCustomBtn"
                style="width:auto;padding:0.8rem 2.5rem;font-size:1rem;">
          ▶ Start Test
        </button>
        <div style="font-size:0.85rem;color:var(--text-secondary);" id="chunkInfo"></div>
      </div>
    </div>

    <!-- Test Section (hidden until started) -->
    <div id="testSection" style="display:none;">

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;
                    flex-wrap:wrap;gap:1rem;margin-bottom:1rem;">
          <div>
            <span style="font-weight:700;font-size:1.1rem;" id="chunkLabel"></span>
            <span style="color:var(--text-secondary);font-size:0.85rem;margin-left:0.6rem;"
                  id="chunkProgress"></span>
          </div>
          <div class="stats" style="margin:0;">
            <span class="stat-badge" id="customWpm">⚡ — WPM</span>
            <span class="stat-badge" id="customAcc">🎯 100%</span>
            <span class="stat-badge" id="customErrors">❌ 0</span>
          </div>
        </div>

        <!-- Progress bar -->
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="customProgressBar"></div>
        </div>

        <!-- Typing display -->
        <div class="typing-display" id="customDisplay"></div>

        <input
          type="text"
          class="hidden-input"
          id="customInput"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="none"
          spellcheck="false"
          inputmode="text"
          readonly
        >

        <!-- Chunk complete message -->
        <div id="chunkComplete" style="
          display:none;
          background:rgba(46,139,87,0.1);
          border:1.5px solid #2e8b57;
          border-radius:20px;
          padding:1.2rem 1.5rem;
          margin-top:1.2rem;
          text-align:center;
        ">
          <div style="font-size:1.4rem;margin-bottom:0.3rem;" id="chunkCompleteIcon">🎉</div>
          <div style="font-weight:700;font-size:1.05rem;color:#2e8b57;"
               id="chunkCompleteMsg"></div>
          <div style="color:var(--text-secondary);font-size:0.88rem;margin-top:0.3rem;"
               id="chunkCompleteStats"></div>
        </div>

        <div style="display:flex;gap:0.8rem;margin-top:1.2rem;flex-wrap:wrap;">
          <button class="btn" id="retryChunkBtn">⟳ Retry</button>
          <button class="btn" id="backToInputBtn">← Change Text</button>
          <button class="btn btn-primary" id="nextChunkBtn"
                  style="width:auto;padding:0.65rem 2rem;display:none;">
            Next Chunk →
          </button>
        </div>
      </div>

      <!-- Session results -->
      <div class="card" id="sessionResults" style="display:none;">
        <h3>📊 Session Results</h3>
        <div id="sessionResultsGrid" class="result-stats-grid"
             style="margin-top:1rem;"></div>
      </div>

    </div>

  </main>

  <footer>
    © 2026 <strong>PikuNotes</strong> · All rights reserved
  </footer>

  <script src="nav.js"></script>
  <script>
  /* ==========================================
     custom.html — Script
     ========================================== */

  /* ── Sample texts ── */
  const SAMPLES = [
    `The quick brown fox jumps over the lazy dog. Pack my box with five dozen liquor jugs. How vexingly quick daft zebras jump! The five boxing wizards jump quickly.`,
    `To be, or not to be, that is the question. Whether tis nobler in the mind to suffer the slings and arrows of outrageous fortune, or to take arms against a sea of troubles.`,
    `function fibonacci(n) { if (n <= 1) return n; return fibonacci(n - 1) + fibonacci(n - 2); } console.log(fibonacci(10));`,
    `In the beginning, the universe was created. This has made a lot of people very angry and has been widely regarded as a bad move. Many races believe that it was created by some sort of god.`,
    `Dear team, I wanted to follow up on our meeting from yesterday. Please review the attached documents and send your feedback by end of day Friday. Thank you for your continued support.`
  ];

  /* ── State ── */
  let chunks       = [];
  let currentChunk = 0;
  let charSpans    = [];
  let currentPos   = 0;
  let correctChars = 0;
  let totalTyped   = 0;
  let errors       = 0;
  let startTime    = null;
  let chunkDone    = false;
  let sessionStats = [];

  /* ── DOM ── */
  const textarea       = document.getElementById('customTextarea');
  const textMeta       = document.getElementById('textMeta');
  const chunkInfo      = document.getElementById('chunkInfo');
  const inputSection   = document.getElementById('inputSection');
  const testSection    = document.getElementById('testSection');
  const customDisplay  = document.getElementById('customDisplay');
  const customInput    = document.getElementById('customInput');
  const customWpm      = document.getElementById('customWpm');
  const customAcc      = document.getElementById('customAcc');
  const customErrors   = document.getElementById('customErrors');
  const chunkLabel     = document.getElementById('chunkLabel');
  const chunkProgress  = document.getElementById('chunkProgress');
  const chunkComplete  = document.getElementById('chunkComplete');
  const nextChunkBtn   = document.getElementById('nextChunkBtn');
  const customProgressBar = document.getElementById('customProgressBar');

  /* ── Live textarea stats ── */
  textarea.addEventListener('input', updateMeta);

  function updateMeta() {
    const text  = textarea.value.trim();
    const chars = text.length;
    const words = text ? text.split(/\s+/).filter(Boolean).length : 0;
    textMeta.textContent = `${chars} characters · ${words} words`;

    /* chunk preview */
    if (chars >= 10) {
      const c = splitIntoChunks(text);
      chunkInfo.textContent =
        c.length > 1
          ? `Will split into ${c.length} chunks of ~100 words each`
          : `1 chunk · ready to start`;
    } else {
      chunkInfo.textContent = '';
    }
  }

  /* ── Split text into ~100 word chunks ── */
  function splitIntoChunks(text) {
    const words  = text.trim().split(/\s+/);
    const size   = 100;
    const result = [];
    for (let i = 0; i < words.length; i += size) {
      result.push(words.slice(i, i + size).join(' '));
    }
    return result;
  }

  /* ── Sample button ── */
  document.getElementById('sampleBtn').addEventListener('click', () => {
    textarea.value = SAMPLES[Math.floor(Math.random() * SAMPLES.length)];
    updateMeta();
  });

  document.getElementById('clearTextBtn').addEventListener('click', () => {
    textarea.value = '';
    updateMeta();
  });

  /* ── Start test ── */
  document.getElementById('startCustomBtn').addEventListener('click', () => {
    const text = textarea.value.trim();
    if (text.length < 10) {
      alert('Please enter at least 10 characters.');
      return;
    }

    chunks       = splitIntoChunks(text);
    currentChunk = 0;
    sessionStats = [];

    inputSection.style.display = 'none';
    testSection.style.display  = 'block';
    document.getElementById('sessionResults').style.display = 'none';

    loadChunk(0);
  });

  /* ── Load chunk ── */
  function loadChunk(idx) {
    currentChunk = idx;
    chunkDone    = false;
    currentPos   = 0;
    correctChars = 0;
    totalTyped   = 0;
    errors       = 0;
    startTime    = null;

    customInput.value = '';
    chunkComplete.style.display = 'none';
    nextChunkBtn.style.display  = 'none';

    chunkLabel.textContent   = `Chunk ${idx + 1}`;
    chunkProgress.textContent =
      chunks.length > 1 ? `${idx + 1} of ${chunks.length}` : '';

    customWpm.textContent    = '⚡ — WPM';
    customAcc.textContent    = '🎯 100%';
    customErrors.textContent = '❌ 0';

    customProgressBar.style.width = '0%';

    renderChunkText(chunks[idx]);

    setTimeout(() => {
      customInput.removeAttribute('readonly');
      customInput.focus();
    }, 50);
  }

  /* ── Render chunk text ── */
  function renderChunkText(text) {
    customDisplay.innerHTML = '';
    charSpans = [];

    for (let i = 0; i < text.length; i++) {
      const span = document.createElement('span');
      span.className = 'char' + (i === 0 ? ' current' : '');
      span.textContent = text[i] === ' ' ? '\u00A0' : text[i];
      customDisplay.appendChild(span);
      charSpans.push(span);
    }
  }

  /* ── Input ── */
  customInput.addEventListener('input', () => {
    if (chunkDone) return;

    const val   = customInput.value;
    const typed = val[val.length - 1];
    if (!typed) return;

    if (!startTime) startTime = Date.now();

    if (currentPos >= charSpans.length) return;

    const expected = chunks[currentChunk][currentPos];
    const correct  = typed === expected;

    charSpans[currentPos].classList.remove('current');

    if (correct) {
      charSpans[currentPos].classList.add('correct');
      correctChars++;
    } else {
      charSpans[currentPos].classList.add('incorrect');
      errors++;
    }

    totalTyped++;
    currentPos++;

    if (currentPos < charSpans.length) {
      charSpans[currentPos].classList.add('current');
      scrollCursor();
    }

    customInput.value = '';
    updateStats();

    /* progress bar */
    const pct = Math.round((currentPos / charSpans.length) * 100);
    customProgressBar.style.width = pct + '%';

    if (currentPos >= charSpans.length) finishChunk();
  });

  customInput.addEventListener('keydown', e => {
    if (e.key === 'Backspace') {
      e.preventDefault();
      if (currentPos === 0) return;
      const prev = chunks[currentChunk][currentPos - 1];
      if (prev === ' ') return;

      currentPos--;
      const wasCorrect = charSpans[currentPos].classList.contains('correct');
      charSpans[currentPos].classList.remove('correct','incorrect','current');
      charSpans[currentPos].classList.add('current');
      if (currentPos + 1 < charSpans.length)
        charSpans[currentPos + 1].classList.remove('current');
      if (totalTyped > 0) totalTyped--;
      if (wasCorrect) correctChars = Math.max(0, correctChars - 1);
      customInput.value = '';
      updateStats();
    }

    if (e.key === 'Tab') {
      e.preventDefault();
      loadChunk(currentChunk);
    }
  });

  customDisplay.addEventListener('click', () => {
    customInput.removeAttribute('readonly');
    customInput.focus();
  });

  function scrollCursor() {
    const cur = charSpans[currentPos];
    if (!cur) return;
    const top = cur.offsetTop;
    const bot = top + cur.offsetHeight;
    const dTop = customDisplay.scrollTop;
    const dBot = dTop + customDisplay.clientHeight;
    if (top < dTop || bot > dBot)
      customDisplay.scrollTop = top - customDisplay.clientHeight / 2;
  }

  /* ── Stats ── */
  function updateStats() {
    const elapsed = startTime ? (Date.now() - startTime) / 60000 : 0;
    const wpm     = elapsed > 0 ? Math.round((correctChars / 5) / elapsed) : 0;
    const acc     = totalTyped > 0
      ? Math.round((correctChars / totalTyped) * 100) : 100;

    customWpm.textContent    = `⚡ ${wpm} WPM`;
    customAcc.textContent    = `🎯 ${acc}%`;
    customErrors.textContent = `❌ ${errors}`;
  }

  /* ── Finish chunk ── */
  function finishChunk() {
    chunkDone = true;
    customInput.blur();

    const elapsed = startTime ? (Date.now() - startTime) / 60000 : 0.001;
    const wpm     = Math.round((correctChars / 5) / elapsed);
    const acc     = totalTyped > 0
      ? Math.round((correctChars / totalTyped) * 100) : 100;

    sessionStats.push({ wpm, acc, errors, chunk: currentChunk + 1 });

    const isLast = currentChunk === chunks.length - 1;

    document.getElementById('chunkCompleteIcon').textContent =
      isLast ? '🏆' : '✅';
    document.getElementById('chunkCompleteMsg').textContent =
      isLast ? 'Test Complete!' : `Chunk ${currentChunk + 1} Done!`;
    document.getElementById('chunkCompleteStats').textContent =
      `${wpm} WPM · ${acc}% accuracy · ${errors} errors`;

    chunkComplete.style.display = 'block';
    customProgressBar.style.width = '100%';

    if (!isLast) {
      nextChunkBtn.style.display = 'inline-flex';
    } else {
      showSessionResults();
    }
  }

  /* ── Session results ── */
  function showSessionResults() {
    const resultsDiv = document.getElementById('sessionResults');
    const grid       = document.getElementById('sessionResultsGrid');
    resultsDiv.style.display = 'block';

    const avgWpm = Math.round(
      sessionStats.reduce((a, b) => a + b.wpm, 0) / sessionStats.length
    );
    const avgAcc = Math.round(
      sessionStats.reduce((a, b) => a + b.acc, 0) / sessionStats.length
    );
    const totalErrors = sessionStats.reduce((a, b) => a + b.errors, 0);

    grid.innerHTML = `
      <div class="result-stat-item">⚡ ${avgWpm} avg WPM</div>
      <div class="result-stat-item">🎯 ${avgAcc}% avg accuracy</div>
      <div class="result-stat-item">❌ ${totalErrors} total errors</div>
      <div class="result-stat-item">📄 ${chunks.length} chunk${chunks.length > 1 ? 's' : ''} done</div>
    `;

    resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  /* ── Nav buttons ── */
  nextChunkBtn.addEventListener('click', () => loadChunk(currentChunk + 1));

  document.getElementById('retryChunkBtn').addEventListener('click', () =>
    loadChunk(currentChunk));

  document.getElementById('backToInputBtn').addEventListener('click', () => {
    testSection.style.display  = 'none';
    inputSection.style.display = 'block';
  });

  </script>

</body>
</html>
