<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piku Typing — Lessons</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='5' y='5' width='90' height='90' rx='20' fill='%233a6bc5'/><path d='M35 30V70M35 30H55C63.2843 30 70 36.7157 70 45C70 53.2843 63.2843 60 55 60H35' stroke='white' stroke-width='10' stroke-linecap='round'/></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ========== HEADER ========== -->
  <header class="main-header">
    <a class="brand" href="Index.html">
      <svg width="40" height="40" viewBox="0 0 100 100" fill="none">
        <defs>
          <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#3a6bc5"/>
            <stop offset="100%" style="stop-color:#7351b5"/>
          </linearGradient>
        </defs>
        <rect x="5" y="5" width="90" height="90" rx="20" fill="url(#pg)"/>
        <rect x="5" y="5" width="90" height="45" rx="20" fill="white" fill-opacity="0.1"/>
        <path d="M35 30V70M35 30H55C63.28 30 70 36.72 70 45C70 53.28 63.28 60 55 60H35"
              stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="58" y="65" width="12" height="4" fill="white">
          <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
        </rect>
      </svg>
      <div class="logo">Piku Typing</div>
    </a>
    <div class="header-actions" id="headerActions"></div>
  </header>

  <!-- ========== MAIN ========== -->
  <main class="container">

    <!-- Hero -->
    <div class="lessons-hero">
      <h1>📚 Typing Lessons</h1>
      <p>Start from zero or jump to your level. Every lesson builds on the last — complete them in order for best results.</p>
    </div>

    <!-- Progress Summary -->
    <div class="card" id="progressCard">
      <div class="card-header-row">
        <h3>🎯 Your Progress</h3>
        <button class="btn btn-sm" id="resetProgressBtn">Reset</button>
      </div>
      <div class="progress-bar-wrap" style="margin-bottom:0.6rem;">
        <div class="progress-bar-fill" id="overallProgressBar"></div>
      </div>
      <div id="progressLabel" style="font-size:0.88rem;color:var(--text-secondary);">
        Loading progress...
      </div>
    </div>

    <!-- Tracks -->
    <div id="tracksContainer"></div>

  </main>

  <footer>
    © 2026 <strong>PikuNotes</strong> · All rights reserved
  </footer>

  <script src="nav.js"></script>
  <script src="lessons-data.js"></script>
  <script>
  /* ==========================================
     lessons.html — page script
     ========================================== */

  /* ── Build lesson hub ── */
  function buildHub() {
    const completed  = getCompletedLessons();
    const total      = ALL_LESSONS_FLAT.length;
    const doneCount  = ALL_LESSONS_FLAT.filter(l => completed.includes(l.id)).length;
    const pct        = Math.round((doneCount / total) * 100);

    document.getElementById('overallProgressBar').style.width = pct + '%';
    document.getElementById('progressLabel').textContent =
      `${doneCount} of ${total} lessons completed (${pct}%)`;

    const container = document.getElementById('tracksContainer');
    container.innerHTML = '';

    Object.entries(LESSONS_DATA).forEach(([trackKey, track]) => {
      const trackDiv = document.createElement('div');
      trackDiv.className = 'lessons-track';

      const title = document.createElement('div');
      title.className = 'track-title';
      title.innerHTML = `
        ${track.label}
        <span style="font-size:0.85rem;font-weight:400;color:var(--text-secondary);">
          — ${track.description}
        </span>
      `;
      trackDiv.appendChild(title);

      const grid = document.createElement('div');
      grid.className = 'lessons-grid';

      track.lessons.forEach((lesson, idx) => {
        const isDone = completed.includes(lesson.id);
        const card   = document.createElement('a');
        card.className = 'lesson-card' + (isDone ? ' completed' : '');
        card.href = `lesson.html?id=${lesson.id}`;

        card.innerHTML = `
          <div class="lesson-number">${track.label.split(' ')[1] || trackKey} · Lesson ${idx + 1}</div>
          <div class="lesson-title">${lesson.title}</div>
          <div class="lesson-keys">${lesson.keys}</div>
          <div style="font-size:0.8rem;color:var(--text-secondary);margin-top:0.2rem;">
            ${lesson.tasks.length} task${lesson.tasks.length > 1 ? 's' : ''}
            ${isDone ? '· <span style="color:#2e8b57;font-weight:600;">Done ✓</span>' : ''}
          </div>
        `;

        grid.appendChild(card);
      });

      trackDiv.appendChild(grid);
      container.appendChild(trackDiv);
    });
  }

  /* ── Reset progress ── */
  document.getElementById('resetProgressBtn').addEventListener('click', () => {
    if (confirm('Reset all lesson progress? This cannot be undone.')) {
      localStorage.removeItem('pt_completed_lessons');
      buildHub();
    }
  });

  buildHub();
  </script>

</body>
</html>
